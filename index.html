<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>zenithy - Web Design & Identity V Topup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Mitr:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #e6f7ff;
            --paper: #ffffff;
            --text-dark: #3a5c78;
            --text-light: #6b8fae;
            --accent-pink: #4ba3e3;
            --accent-yellow: #fff9db;
            --mint: #a2dcd4;
            --peach: #ffc2b3;
            --sky: #b8e9ed;
            --line-color: rgba(75, 163, 227, 0.2);
        }
        body {
            background-color: var(--bg-main);
            background-image: repeating-linear-gradient(to right, #e6f7ff, #e6f7ff 40px, #d2eeff 40px, #d2eeff 80px);
            font-family: 'Mitr', sans-serif;
            color: var(--text-dark);
            overflow-x: hidden;
        }
        .font-fredoka { font-family: 'Fredoka', sans-serif; }
        .paper-container {
            background-color: var(--paper);
            position: relative;
            background-image: repeating-linear-gradient(to bottom, transparent, transparent 35px, var(--line-color) 35px, var(--line-color) 36px);
            background-position: top 40px center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
        }
        .jagged-top {
            position: absolute;
            top: -12px; left: 0; width: 100%; height: 13px;
            background: linear-gradient(-45deg, transparent 9px, var(--paper) 0), linear-gradient(45deg, transparent 9px, var(--paper) 0);
            background-size: 18px 18px;
            background-repeat: repeat-x;
        }
        .jagged-bottom {
            position: absolute;
            bottom: -12px; left: 0; width: 100%; height: 13px;
            background: linear-gradient(-45deg, var(--paper) 9px, transparent 0), linear-gradient(45deg, var(--paper) 9px, transparent 0);
            background-size: 18px 18px;
            background-repeat: repeat-x;
        }
        .polaroid {
            background: #fff;
            padding: 8px 8px 35px 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border: 1px solid #e1f0fa;
            position: relative;
        }
        @media (min-width: 640px) { .polaroid { padding: 10px 10px 45px 10px; } }
        .tape {
            position: absolute;
            mix-blend-mode: multiply;
            opacity: 0.85;
            z-index: 20;
        }
        .tape-1 { clip-path: polygon(1% 2%, 99% 0%, 98% 98%, 0% 100%); }
        .tape-2 { clip-path: polygon(0% 0%, 100% 1%, 99% 100%, 2% 99%); }
        .tape-3 { clip-path: polygon(2% 1%, 98% 2%, 100% 99%, 0% 98%); }
       
        .bg-tape-pink { background-color: #ffb6c1; }
        .bg-tape-yellow { background-color: #fdf096; }
        .bg-tape-mint { background-color: #aee6e6; }
        .bg-tape-blue { background-color: #bce3f2; }

        @keyframes float-anim {
            0%, 100% { transform: translateY(0) scale(1) rotate(var(--rot, 0deg)); }
            50% { transform: translateY(-6px) scale(1.05) rotate(calc(var(--rot, 0deg) + 5deg)); }
        }
        .decor-float {
            animation: float-anim 3.5s ease-in-out infinite;
            pointer-events: none;
        }
        .delay-1 { animation-delay: 0.5s; }
        .delay-2 { animation-delay: 1.5s; }
        .dotted-leader { flex-grow: 1; border-bottom: 2px dotted var(--text-light); margin: 0 8px; opacity: 0.3; transform: translateY(-4px); }
        .modal-overlay { background-color: rgba(58, 92, 120, 0.4); backdrop-filter: blur(4px); }
        .portfolio-card { cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .portfolio-card:hover { transform: translateY(-5px); }
        .link-item {
            display: block; width: 100%; padding: 12px; margin-bottom: 8px; background: white;
            border-radius: 12px; border: 1.5px solid var(--line-color); color: var(--text-dark);
            font-size: 0.85rem; transition: all 0.2s; text-align: center; font-weight: 500;
        }
        .link-item:hover { background: var(--bg-main); border-color: var(--accent-pink); }
    </style>
</head>

                    <svg class="decor-float absolute top-4 sm:top-8 right-4 sm:right-8 w-4 sm:w-6 h-4 sm:h-6 text-[#ffc2b3] opacity-80 z-20" style="--rot: 15deg;" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                    <div class="space-y-2 sm:space-y-6 pt-2">
                        <div>
                            <h2 class="font-fredoka text-[#3a5c78] font-bold text-[12px] sm:text-3xl uppercase tracking-tight leading-none">ZENITHY SERVICES</h2>
